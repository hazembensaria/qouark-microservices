name: CI - Build, Test, Image & Smoke (Microservices)

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  packages: write


# ---------------- TEST ----------------
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
  
      - name: Test auth-service
        run: |
          cd authorizationserver
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test user-service
        run: |
          cd userservice
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test gateway
        run: |
          cd gateway
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test discovery-service
        run: |
          cd discoveryService
          chmod +x mvnw || true
          ./mvnw test
          cd ..


# ---------------- IMAGE BUILD ----------------
publish-image:
  name: Build and push Docker images
  runs-on: ubuntu-latest
  needs: test
  if: github.ref == 'refs/heads/main'

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build & push auth-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/auth-service:${{ github.sha }} ./authorizationserver
        docker push ghcr.io/${{ github.repository_owner }}/auth-service:${{ github.sha }}

    - name: Build & push user-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }} ./userservice
        docker push ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}

    - name: Build & push ticket-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }} ./ticketservice
        docker push ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}

    - name: Build & push storage-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }} ./storageService
        docker push ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}

    - name: Build & push notification-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }} ./notificationservice
        docker push ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}

    - name: Build & push gateway
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/gateway-service:${{ github.sha }} ./gateway
        docker push ghcr.io/${{ github.repository_owner }}/gateway-service:${{ github.sha }}

    - name: Build & push discovery-service
      run: |
        docker build -t ghcr.io/${{ github.repository_owner }}/discovery-service:${{ github.sha }} ./discoveryService
        docker push ghcr.io/${{ github.repository_owner }}/discovery-service:${{ github.sha }}
# ---------------- SMOKE TEST ----------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: publish-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull and run discovery-service only
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/discovery-service:${{ github.sha }}

          docker run -d -p 5002:5002 --name discovery $IMAGE

          for i in {1..30}; do
            if curl -sSf http://localhost:5002/actuator/health; then
              echo "✅ Discovery is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Failed"
          docker logs discovery
          exit 1


# ---------------- DEPLOY ----------------
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: libraryregistery.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push images to ACR
        run: |
          for service in auth-service user-service gateway-service discovery-service; do
            docker pull ghcr.io/${{ github.repository_owner }}/$service:${{ github.sha }}

            docker tag ghcr.io/${{ github.repository_owner }}/$service:${{ github.sha }} \
              libraryregistery.azurecr.io/$service:${{ github.sha }}

            docker push libraryregistery.azurecr.io/$service:${{ github.sha }}
          done
