name: CI - Build, Test, Image & Smoke (Microservices)

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  packages: write


# ---------------- TEST ----------------
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            path: authorizationserver
          - name: user-service
            path: userservice
          - name: gateway
            path: gateway
          - name: discovery-service
            path: discoveryService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests for ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          chmod +x mvnw || true
          ./mvnw test


# ---------------- IMAGE BUILD ----------------
  publish-image:
    name: Build & Push to ACR (Matrix)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: auth-service
            path: authorizationserver

          - service: user-service
            path: userservice

          - service: gateway-service
            path: gateway

          - service: discovery-service
            path: discoveryService

          - service: ticket-service
            path: ticketservice

          - service: notification-service
            path: notificationservice

          - service: storage-service
            path: storageService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: qouark.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push ${{ matrix.service }}
        run: |
          docker build \
            -t qouark.azurecr.io/${{ matrix.service }}:${{ github.sha }} \
            ./${{ matrix.path }}

          docker push qouark.azurecr.io/${{ matrix.service }}:${{ github.sha }}
# ---------------- SMOKE TEST ----------------

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: publish-image

    steps:
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: qouark.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull image
        run: |
          docker pull qouark.azurecr.io/discovery-service:${{ github.sha }}

      - name: Run container
        run: |
          docker run -d \
            -p 5002:5002 \
            --name discovery-service \
            -e SPRING_PROFILES_ACTIVE=docker \
            -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
            -e SERVER_PORT=5002 \
            qouark.azurecr.io/discovery-service:${{ github.sha }}

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:5002/actuator/health; then
              echo "✅ Discovery service is UP"
              exit 0
            fi
            echo "⏳ waiting for startup..."
            sleep 3
          done
          echo "❌ Smoke test failed"
          docker logs discovery-service
          exit 1

# ---------------- DEPLOY ----------------
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - name: auth-service
          - name: user-service
          - name: ticket-service
          - name: storage-service
          - name: gateway-service
          - name: notification-service

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ${{ matrix.service.name }}
        run: |
          az containerapp update \
            --name ${{ matrix.service.name }} \
            --resource-group rg-qouark-microservices \
            --image qouark.azurecr.io/${{ matrix.service.name }}:${{ github.sha }}