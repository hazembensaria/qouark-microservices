name: CI - Build, Test, Image & Smoke (Microservices)

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  packages: write


# ---------------- TEST ----------------
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
  
      - name: Test auth-service
        run: |
          cd authorizationserver
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test user-service
        run: |
          cd userservice
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test gateway
        run: |
          cd gateway
          chmod +x mvnw || true
          ./mvnw test
          cd ..
  
      - name: Test discovery-service
        run: |
          cd discoveryService
          chmod +x mvnw || true
          ./mvnw test
          cd ..


# ---------------- IMAGE BUILD ----------------
  publish-image:
    name: Build & Push to ACR (Matrix)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: auth-service
            path: authorizationserver

          - service: user-service
            path: userservice

          - service: gateway-service
            path: gateway

          - service: discovery-service
            path: discoveryService

          - service: ticket-service
            path: ticketservice

          - service: notification-service
            path: notificationservice

          - service: storage-service
            path: storageService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: qouark.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push ${{ matrix.service }}
        run: |
          docker build \
            -t qouark.azurecr.io/${{ matrix.service }}:${{ github.sha }} \
            ./${{ matrix.path }}

          docker push qouark.azurecr.io/${{ matrix.service }}:${{ github.sha }}
# ---------------- SMOKE TEST ----------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: publish-image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull and run discovery-service only
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/discovery-service:${{ github.sha }}

          docker run -d -p 5002:5002 --name discovery $IMAGE

          for i in {1..30}; do
            if curl -sSf http://localhost:5002/actuator/health; then
              echo "✅ Discovery is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Failed"
          docker logs discovery
          exit 1


# ---------------- DEPLOY ----------------
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy auth-service
        run: |
          az containerapp update \
            --name auth-service \
            --resource-group YOUR_RG \
            --image qouark.azurecr.io/auth-service:${{ github.sha }}

