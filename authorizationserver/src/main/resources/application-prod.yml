server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default-schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    enabled: false

ui:
  app:
    url: ${UI_APP_URL:http://localhost:3000/login}

keys:
  private: ${PRIVATE_KEY}
  public: ${PUBLIC_KEY}